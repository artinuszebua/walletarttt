<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDR Financial Dashboard</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #4CAF50;
            --danger: #f44336;
            --sync: #f39c12;
            --load: #3498db;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        /* Dashboard Cards */
        .dashboard {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            flex: 1;
            text-align: center;
        }
        .card h3 { margin: 0 0 10px 0; font-size: 1.2rem; color: #7f8c8d; }
        .card p { margin: 0; font-size: 1.5rem; font-weight: bold; }
        .balance { color: #2980b9; }
        .income { color: var(--primary); }
        .output { color: var(--danger); }

        /* Form Section */
        .form-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        input, select, button {
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        input[type="text"], input[type="number"] {
            flex: 1;
            min-width: 150px;
        }
        button {
            cursor: pointer;
            border: none;
            color: white;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.8; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-add { background-color: var(--primary); }
        .btn-load { background-color: var(--load); margin-left: auto; }
        .btn-sync { background-color: var(--sync); }
        .btn-export { background-color: #2c3e50; }

        /* Table Section */
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--card-bg);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background-color: #ecf0f1; color: #2c3e50; }
        .type-Income { color: var(--primary); font-weight: bold; }
        .type-Output { color: var(--danger); font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Financial Dashboard</h1>

    <div class="dashboard">
        <div class="card">
            <h3>Total Balance</h3>
            <p class="balance" id="total-balance">Rp 0</p>
        </div>
        <div class="card">
            <h3>Total Input (Income)</h3>
            <p class="income" id="total-income">Rp 0</p>
        </div>
        <div class="card">
            <h3>Total Output (Expense)</h3>
            <p class="output" id="total-output">Rp 0</p>
        </div>
    </div>

    <div class="form-section">
        <input type="text" id="desc" placeholder="Description (e.g., Salary, Rent)" required>
        <input type="number" id="amount" placeholder="Nominal Amount (IDR)" min="1" required>
        <select id="type">
            <option value="Income">Input (Income)</option>
            <option value="Output">Output (Expense)</option>
        </select>
        <button class="btn-add" onclick="addTransaction()">Add Data</button>
        
        <button class="btn-load" id="load-btn" onclick="loadFromDrive()">Load from Drive</button>
        <button class="btn-sync" id="sync-btn" onclick="syncToDrive()">Sync to Drive</button>
        <button class="btn-export" onclick="exportToCSV()">Download Local</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th>Amount (IDR)</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
</div>

<script>
    const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzgWQL_OoGLaU8KHceJWvxiohGAgT5ihS69_WBhWN1d9LEqt9ABWv5HedIDwvIw-dFzuA/exec';

    let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

    const formatIDR = (number) => {
        return new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0
        }).format(number);
    };

    function updateUI() {
        const tableBody = document.getElementById('table-body');
        tableBody.innerHTML = ''; 

        let totalIncome = 0;
        let totalOutput = 0;

        transactions.forEach(trx => {
            if (trx.type === 'Income') totalIncome += trx.amount;
            if (trx.type === 'Output') totalOutput += trx.amount;

            const row = document.createElement('tr');
            row.innerHTML = `
                <td>${trx.date}</td>
                <td>${trx.desc}</td>
                <td class="type-${trx.type}">${trx.type}</td>
                <td>${formatIDR(trx.amount)}</td>
            `;
            tableBody.appendChild(row);
        });

        document.getElementById('total-balance').textContent = formatIDR(totalIncome - totalOutput);
        document.getElementById('total-income').textContent = formatIDR(totalIncome);
        document.getElementById('total-output').textContent = formatIDR(totalOutput);
    }

    function addTransaction() {
        const desc = document.getElementById('desc').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;

        if (!desc.trim() || !amount || amount <= 0) {
            alert('Please enter a valid description and nominal amount.');
            return;
        }

        transactions.push({
            date: new Date().toLocaleDateString('en-GB'),
            desc: desc,
            type: type,
            amount: parseFloat(amount)
        });

        localStorage.setItem('transactions', JSON.stringify(transactions));
        
        document.getElementById('desc').value = '';
        document.getElementById('amount').value = '';
        updateUI();
    }

    async function loadFromDrive() {
        if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === '') {
            alert("Please paste your Google Script URL into the HTML code first!");
            return;
        }

        const loadBtn = document.getElementById('load-btn');
        loadBtn.textContent = "Loading...";
        loadBtn.disabled = true;

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL); 
            const cloudData = await response.json();
            
            if (Array.isArray(cloudData) && cloudData.length > 0) {
                transactions = cloudData;
                localStorage.setItem('transactions', JSON.stringify(transactions));
                updateUI();
                alert("Success! Data loaded from Google Drive.");
            } else {
                alert("No data found in Google Drive yet.");
            }
        } catch (error) {
            alert("Network error. Could not load from Google Drive.");
            console.error(error);
        } finally {
            loadBtn.textContent = "Load from Drive";
            loadBtn.disabled = false;
        }
    }

    async function syncToDrive() {
        if (transactions.length === 0) {
            alert("No data available to sync.");
            return;
        }
        
        if (!GOOGLE_SCRIPT_URL || GOOGLE_SCRIPT_URL === '') {
            alert("Please paste your Google Script URL into the HTML code first!");
            return;
        }

        const syncBtn = document.getElementById('sync-btn');
        syncBtn.textContent = "Syncing...";
        syncBtn.disabled = true;

        try {
            const response = await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(transactions)
            });

            const result = await response.json();
            
            if (result.status === 'success') {
                alert("Success! CSV and JSON files updated in your Google Drive.");
            } else {
                alert("Error saving to Drive: " + result.message);
            }
        } catch (error) {
            alert("Network error. Could not reach Google Drive.");
            console.error(error);
        } finally {
            syncBtn.textContent = "Sync to Drive";
            syncBtn.disabled = false;
        }
    }

    function exportToCSV() {
        if (transactions.length === 0) return alert("No data to export.");
        let csvContent = "Date,Description,Type,Amount\n";
        transactions.forEach(trx => {
            csvContent += `"${trx.date}","${trx.desc}","${trx.type}","${trx.amount}"\n`;
        });
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = "financial_data.csv";
        link.click();
    }

    window.onload = updateUI;
</script>

</body>
</html>
